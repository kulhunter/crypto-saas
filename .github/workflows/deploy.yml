name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build with Next.js
        run: |
          cd frontend
          npm run build

      - name: Update docs folder
        run: |
          # Clean docs folder
          rm -rf docs/*
          # Copy build output to docs
          cp -r frontend/out/* docs/
          # Ensure CNAME is there
          cp frontend/public/CNAME docs/ || true

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add docs/
          git commit -m "deploy: automatic build to docs folder" || echo "No changes to commit"
          git push origin main
